<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML Capture Kit</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Private Capture Tool</p>
        <h1>HTML Capture Kit</h1>
        <p class="copy">
          Export the current page into a `.figcap.json` file that can be imported by the companion
          Figma plugin.
        </p>
      </section>

      <section class="panel">
        <div class="button-group">
          <button id="toggleFooterButton" class="secondary-button" type="button">
            Hide Footer On This Site
          </button>
        </div>

        <label class="toggle">
          <input id="ignoreSticky" type="checkbox" checked />
          <span>Ignore sticky elements</span>
        </label>

        <label class="toggle">
          <input id="ignoreFixed" type="checkbox" checked />
          <span>Ignore fixed elements</span>
        </label>

        <label class="toggle">
          <input id="captureImages" type="checkbox" checked />
          <span>Inline images when possible</span>
        </label>

        <label class="field" for="ignoreSelectors">
          <span>Extra ignore selectors</span>
          <textarea
            id="ignoreSelectors"
            rows="4"
            placeholder=".toast, footer, [data-capture-ignore]"
          ></textarea>
        </label>

        <button id="captureButton" class="capture-button" type="button">Capture Current Page</button>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="hint">
        <strong>Tip:</strong> Mark any subtree with <code>data-capture-ignore</code> and it will
        be skipped automatically.
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
