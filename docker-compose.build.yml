services:
  interdev-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: ${SERVER_IMAGE:-interdev/server:local}

  interdev-client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://your-project-ref.supabase.co}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-replace-with-anon-key}
        VITE_APP_NAME: ${VITE_APP_NAME:-InterDev}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_ENV: ${VITE_ENV:-production}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
    image: ${CLIENT_IMAGE:-interdev/client:local}
